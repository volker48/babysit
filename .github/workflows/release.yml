name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            target: aarch64-apple-darwin
          - runner: macos-15-intel
            target: x86_64-apple-darwin
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Verify tag matches package version
        run: |
          package_version="$(cargo metadata --no-deps --format-version 1 \
            | python3 -c 'import json,sys; print(json.load(sys.stdin)["packages"][0]["version"])')"
          test "$GITHUB_REF_NAME" = "v$package_version"
      - name: Install pinned toolchain and target
        run: |
          rustup toolchain install
          rustup target add "${{ matrix.target }}"
      - name: Build with locked dependencies
        run: cargo build --locked --release --target "${{ matrix.target }}"
      - name: Smoke test binary
        run: |
          binary="target/${{ matrix.target }}/release/babysit"
          "$binary" --help >/dev/null
          test "$("$binary" --version)" = "babysit ${GITHUB_REF_NAME#v}"
      - name: Package archive and checksum
        run: |
          archive="babysit-${GITHUB_REF_NAME}-${{ matrix.target }}.tar.gz"
          tar -C "target/${{ matrix.target }}/release" -czf "$archive" babysit
          shasum -a 256 "$archive" > "$archive.sha256"
          mkdir dist
          mv "$archive" "$archive.sha256" dist/
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: babysit-${{ matrix.target }}
          path: dist/
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5.0.0
        with:
          pattern: babysit-*
          path: dist
          merge-multiple: true
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api --silent "repos/$GITHUB_REPOSITORY/git/ref/tags/$GITHUB_REF_NAME"
          cat dist/*.sha256 > dist/SHA256SUMS
          if ! gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release create "$GITHUB_REF_NAME" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$GITHUB_REF_NAME" \
              --generate-notes \
              --draft \
              --verify-tag
          fi
          gh release upload "$GITHUB_REF_NAME" dist/* \
            --repo "$GITHUB_REPOSITORY" \
            --clobber
          gh release edit "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --draft=false
